<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Barangay Olo-Olo Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --primary-blue: #1e40af;
      --primary-dark: #1e3a8a;
      --text-dark: #1f2937;
      --bg-light: #f3f4f6;
      --main-font: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
    }

    *, body, input, button, label, h2, p {
      font-family: var(--main-font) !important;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: white;
      width: 100%;
      max-width: 400px;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      text-align: center;
      margin: 20px;
    }

    .login-logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 15px auto;
    }

    .login-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .login-card h2 {
      color: var(--primary-dark);
      margin: 0 0 5px 0;
      font-size: 1.4rem;
      font-weight: 800;
    }

    .login-card p {
      color: #64748b;
      font-size: 0.85rem;
      margin: 0 0 25px 0;
    }

    .login-input-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .login-input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .login-input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .login-input-group input:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
    }

    .btn-login {
      width: 100%;
      background: var(--primary-blue);
      color: white;
      border: none;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .btn-login:hover {
      background: var(--primary-dark);
    }

    .login-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="Olo-Olo Logo">
    </div>
    <h2>Barangay Olo-Olo</h2>
    <p>Authorized Personnel Login Portal</p>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="login-input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
      </div>
      
      <div class="login-input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login">Access System</button>
      <div id="loginError" class="login-error">⚠️ Invalid Username or Password</div>
    </form>
  </div>

  <script>
    // 🔐 CREDENTIALS
    const VALID_USERNAME = "admin";
    const VALID_PASSWORD = "olo";

    function handleLogin(event) {
      event.preventDefault();
      const userVal = document.getElementById('username').value.trim();
      const passVal = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');

      if (userVal === VALID_USERNAME && passVal === VALID_PASSWORD) {
        sessionStorage.setItem('olo_logged_in', 'true');
        errorDiv.style.display = 'none';
        // Redirect to the main application page
        window.location.href = 'index.html';
      } else {
        errorDiv.style.display = 'block';
      }
    }

    // Security check: If already logged in, skip login page entirely
    if (sessionStorage.getItem('olo_logged_in') === 'true') {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>

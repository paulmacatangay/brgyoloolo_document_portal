<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Barangay Olo-Olo Document Portal</title>
  <script>
    if (sessionStorage.getItem('olo_logged_in') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --primary-blue: #1e40af;
      --primary-dark: #1e3a8a;
      --text-dark: #1f2937;
      --bg-light: #f3f4f6;
      --main-font: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
    }

    *, body, button, input, h1, h2, p {
      font-family: var(--main-font) !important;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
      color: var(--text-dark);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrapper {
      background: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
      margin: 20px;
    }

    .logo-container {
      width: 80px;
      height: 80px;
      margin: 0 auto 15px auto;
    }

    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .login-wrapper h1 {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--primary-dark);
      margin: 0 0 5px 0;
      text-transform: uppercase;
    }

    .login-wrapper p {
      font-size: 0.85rem;
      color: #64748b;
      margin: 0 0 25px 0;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--primary-blue);
    }

    .btn-login {
      width: 100%;
      background: var(--primary-blue);
      color: white;
      border: none;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login:hover {
      background: var(--primary-dark);
    }

    .error-msg {
      display: none;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="logo-container">
      <img src="logo.png" alt="Olo-Olo Logo" onerror="this.style.display='none'">
    </div>
    <h1>Barangay Olo-Olo</h1>
    <p>Document Management Portal</p>
    
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="passwordField">Admin Password</label>
        <input type="password" id="passwordField" placeholder="Enter password" required autofocus>
      </div>
      
      <button type="submit" class="btn-login">Login</button>
      <div id="errorMsg" class="error-msg">Incorrect password. Please try again.</div>
    </form>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const pass = document.getElementById('passwordField').value;
      if (pass === 'olo') {
        sessionStorage.setItem('olo_logged_in', 'true');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('passwordField').value = '';
        document.getElementById('passwordField').focus();
      }
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barangay Clearance - Under Construction</title>
  <script>
    if (sessionStorage.getItem('olo_logged_in') !== 'true') {
      window.location.href = 'index.html';
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --primary-blue: #1e40af;
      --primary-dark: #1e3a8a;
      --text-dark: #1f2937;
      --bg-light: #f3f4f6;
      --main-font: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
    }

    *, body, button, h1, h2, p {
      font-family: var(--main-font) !important;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-light);
      color: var(--text-dark);
      margin: 0;
      padding: 0;
    }

    .site-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
      color: white;
      padding: 16px 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.15);
      border-bottom: 3px solid #60a5fa;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-logo { width: 65px; height: 65px; }
    .header-logo img { width: 100%; height: 100%; object-fit: contain; }
    .header-titles h1 { margin: 0; font-size: 1.25rem; }
    .header-titles p { margin: 3px 0 0 0; font-size: 0.8rem; color: #bfdbfe; }

    .btn-nav {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }

    .construction-box {
      max-width: 500px;
      width: calc(100% - 40px);
      margin: 50px auto;
      background: white;
      padding: 30px 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      border-top: 5px solid #f59e0b;
    }

    .status-badge {
      display: inline-block;
      background: #fef9c3;
      color: #854d0e;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .construction-box h2 { color: var(--primary-dark); font-size: 1.3rem; margin: 0 0 10px 0; }
    .construction-box p { color: #64748b; line-height: 1.6; font-size: 0.9rem; margin-bottom: 25px; }

    .btn-back {
      display: inline-block;
      background: var(--primary-blue);
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700;
      transition: background 0.2s;
    }

    @media (max-width: 600px) {
      .header-content { flex-direction: column; text-align: center; }
      .header-left { flex-direction: column; gap: 8px; }
      .btn-nav { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-content">
      <div class="header-left">
        <div class="header-logo">
          <img src="logo.png" alt="Olo-Olo Logo">
        </div>
        <div class="header-titles">
          <h1>Clearance Generator</h1>
          <p>Module Status: Under Development</p>
        </div>
      </div>
      <a href="dashboard.html" class="btn-nav">Dashboard</a>
    </div>
  </header>

  <div class="construction-box">
    <span class="status-badge">Status: In Progress</span>
    <h2>Module Under Construction</h2>
    <p>
      The Barangay Clearance system is undergoing development. Once ready, you will be able to manage and print legal clearance certifications directly from this tab.
    </p>
    <a href="dashboard.html" class="btn-back">Return to Dashboard</a>
  </div>

</body>
</html>
